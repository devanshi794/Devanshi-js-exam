<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Task</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="css/style.css">


</head>
<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container">
          <a class="navbar-brand" href="./index.html">Task Management</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link" href="./index.html">Display Task</a>
              </li>
              <li class="nav-item">
                <a class="nav-link active" href="./add-task.html">Add Tasks</a>


              </li>
            </ul>
            <form class="d-flex" role="search">
              <input
                class="form-control me-2"
                type="search"
                placeholder="Search"
                aria-label="Search"
              />
              <button class="btn btn-outline-success" type="submit">
                Search
              </button>
            </form>
          </div>
        </div>
      </nav>
    <h1>➕ Add New Task</h1>
    <form id="addForm">
        <input type="text" id="title" placeholder="Task Title *" required>
        <textarea id="desc" placeholder="Description" required></textarea>
        <input type="date" id="dueDate" required>
        <select id="priority" required>
            <option value="">Select Priority</option>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
        </select>
        <button type="submit">Add Task</button>
        <button type="button" onclick="window.location.href='index.html'">Cancel</button>
    </form>
    
    <script src="./js/script.js"></script>
    <script>
        document.getElementById('addForm').onsubmit = function(e) {
            e.preventDefault();
            let title = document.getElementById('title').value;
            let desc = document.getElementById('desc').value;
            let dueDate = document.getElementById('dueDate').value;
            let priority = document.getElementById('priority').value;
            
            if (!title || !desc || !dueDate || !priority) {
                alert('Please fill all fields');
                return;
            }
            
            addTask(title, desc, dueDate, priority);
        };
    </script>
</body>
</html>

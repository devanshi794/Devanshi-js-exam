    <!DOCTYPE html>
    <html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>View Tasks</title>

    </head>

    <body>
        <h1> All Tasks</h1>

        <input type="text" id="search" placeholder="Search by title..." onkeyup="filterTasks()">
        <button onclick="window.location.href='index.html'">Home</button>
        <button onclick="window.location.href='add-task.html'">Add Task</button>

        <table id="taskTable">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Description</th>
                    <th>Due Date</th>
                    <th>Priority</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="taskBody"></tbody>
        </table>

        <script src="./js/script.js"></script>
        <script>
            let filteredTasks = [];

            function showTasks(tasksToShow) {
                let tbody = document.getElementById('taskBody');
                tbody.innerHTML = '';
                for (let i = 0; i < tasksToShow.length; i++) {
                    let task = tasksToShow[i];
                    let priClass = task.priority === 'high' ? 'high' : '';
                    let statClass = task.status === 'completed' ? 'completed' : '';
                    tbody.innerHTML += `
                    <tr>
                        <td>${task.title}</td>
                        <td>${task.desc}</td>
                        <td>${task.dueDate}</td>
                        <td class="${priClass}">${task.priority}</td>
                        <td class="${statClass}">${task.status}</td>
                        <td>

                            <button onclick="window.location.href='edit-task.html?id=${task.id}'"> Edit</button>
                            <button class="delete" onclick="deleteTask(${task.id})"> Delete</button>
                        </td>

                    </tr>
                `;
                }
            }


            function filterTasks() {
                let searchTerm = document.getElementById('search').value;
                if (searchTerm === '') {
                    showTasks(getAllTasks());
                } else {
                    filteredTasks = searchTasks(searchTerm);
                    showTasks(filteredTasks);
                }
            }

            window.onload = function () {
                showTasks(getAllTasks());
            };
        </script>
    </body>

    </html>
